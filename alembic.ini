# Alembic configuration for Synapse.
#
# We never hardcode the database URL here — `alembic/env.py` reads it from
# `synapse.config.get_settings().db_url` so migrations always target the
# correct vault. Run migrations programmatically via `apply_migrations()`
# in `synapse.graph.db` (the gateway + `synapse init` both invoke it).
#
# Manual CLI use during development:
#     uv run alembic revision --autogenerate -m "describe change"
#     uv run alembic upgrade head
#     uv run alembic history

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =

# Naming convention so future autogenerated migrations are deterministic.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
